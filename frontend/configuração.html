<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Configurações - XarTins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      position: relative;
      overflow: hidden;
    }

    /* FUNDO COM LOGO */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: url('logo-xartins.png') no-repeat center;
      background-size: contain;
      opacity: 0.05;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #1e293b;
    }

    .section {
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f8fafc;
    }

    .section h3 {
      margin-bottom: 10px;
      font-size: 16px;
      color: #2563eb;
    }

    .option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }

    .option label {
      font-size: 14px;
      color: #333;
    }

    /* SWITCH */
    .switch {
      position: relative;
      width: 45px;
      height: 24px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background: #ccc;
      border-radius: 20px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #2563eb;
    }

    input:checked + .slider::before {
      transform: translateX(21px);
    }

    .input-group {
      margin-top: 10px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .save {
      background: #2563eb;
      color: #fff;
    }

    .save:hover {
      background: #1d4ed8;
    }

    .danger {
      background: #e11d48;
      color: #fff;
    }

    .danger:hover {
      background: #be123c;
    }

    /* MODO ESCURO */
    body.dark {
      background: #020617;
    }

    body.dark .container {
      background: #0f172a;
      color: #fff;
    }

    body.dark .section {
      background: #1e293b;
    }

    body.dark input {
      background: #020617;
      color: #fff;
      border: 1px solid #334155;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>⚙️ Configurações</h2>

    <!-- APARÊNCIA -->
    <div class="section">
      <h3>Aparência</h3>

      <div class="option">
        <label>Modo escuro</label>
        <label class="switch">
          <input type="checkbox" id="darkMode">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- NOTIFICAÇÕES -->
    <div class="section">
      <h3>Notificações</h3>

      <div class="option">
        <label>Receber notificações</label>
        <label class="switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- SEGURANÇA -->
    <div class="section">
      <h3>Segurança</h3>

      <div class="input-group">
        <label>Nova senha</label>
        <input type="password" placeholder="Digite nova senha">
      </div>

      <div class="input-group">
        <label>Confirmar senha</label>
        <input type="password" placeholder="Confirme a senha">
      </div>

      <button class="btn save">Salvar senha</button>
    </div>

    <!-- CONTA -->
    <div class="section">
      <h3>Conta</h3>

      <button class="btn danger">Excluir conta</button>
    </div>

  </div>

  <script>
    const toggle = document.getElementById('darkMode');

    toggle.addEventListener('change', () => {
      document.body.classList.toggle('dark');
    });
  </script>

</body>
</html>
