<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil - XarTins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #333;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .profile-container {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .header {
      background: #2563eb;
      height: 150px;
      position: relative;
    }

    .avatar {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .avatar img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid #fff;
      object-fit: cover;
      cursor: pointer;
    }

    .avatar input {
      display: none;
    }

    .avatar label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: #2563eb;
      cursor: pointer;
    }

    .content {
      padding: 70px 30px 30px;
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
      color: #1e293b;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    .info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .input-group {
      text-align: left;
    }

    .input-group label {
      font-size: 13px;
      color: #555;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-group input:focus {
      border-color: #2563eb;
    }

    .actions {
      margin-top: 25px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      margin: 5px;
    }

    .save {
      background: #2563eb;
      color: #fff;
    }

    .save:hover {
      background: #1d4ed8;
    }

    .logout {
      background: #e11d48;
      color: #fff;
    }

    .logout:hover {
      background: #be123c;
    }

    @media(max-width: 700px){
      .info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="profile-container">

    <!-- TOPO -->
    <div class="header"></div>

    <!-- FOTO -->
    <div class="avatar">
      <img id="profilePic" src="https://via.placeholder.com/110" alt="Foto de perfil">
      
      <input type="file" id="uploadPic" accept="image/*">
      <label for="uploadPic">Alterar foto</label>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <h2>Seu Nome</h2>
      <p>@usuario</p>

      <div class="info">
        <div class="input-group">
          <label>Nome</label>
          <input type="text" value="Seu Nome">
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" value="email@email.com">
        </div>

        <div class="input-group">
          <label>Telefone</label>
          <input type="text" placeholder="(00) 00000-0000">
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input type="password" placeholder="********">
        </div>
      </div>

      <div class="actions">
        <button class="btn save">Salvar alterações</button>
        <button class="btn logout">Sair</button>
      </div>
    </div>

  </div>

  <script>
    const uploadPic = document.getElementById('uploadPic');
    const profilePic = document.getElementById('profilePic');

    uploadPic.addEventListener('change', function(){
      const file = this.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = function(e){
          profilePic.src = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
